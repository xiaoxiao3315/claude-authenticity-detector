[mypy]
python_version = 3.11
ignore_missing_imports = True
# All 25 app modules are now in the strict set below and type-clean
# (`mypy *.py` reports zero errors tree-wide). The strict set is the CI gate
# (see scripts/run_typecheck.py) and must stay at zero. New modules should be
# added here when introduced.
warn_redundant_casts = True

# --- graduated strict set (all app modules; must stay at zero mypy errors) ---

[mypy-cli_io]
disallow_incomplete_defs = True
warn_return_any = True
check_untyped_defs = True

[mypy-model_client]
disallow_incomplete_defs = True
warn_return_any = True
check_untyped_defs = True

[mypy-benchmarking]

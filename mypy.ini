[mypy]
python_version = 3.11
ignore_missing_imports = True
# Global baseline is lenient: the legacy modules carry ~300 historical
# union-attr/arg-type findings. Rather than block all work on them, we keep the
# default permissive and HOLD A STRICT LINE on modules that have been cleaned.
# Modules graduate into the strict set below as they are fixed; CI runs the
# strict set (see scripts/run_typecheck.py) and must stay at zero errors.
warn_redundant_casts = True

# --- graduated strict set (must stay at zero mypy errors) ---
# Add a module here once `mypy <module>.py` is clean. Do not remove entries.

[mypy-cli_io]
disallow_incomplete_defs = True
warn_return_any = True
check_untyped_defs = True

[mypy-model_client]
disallow_incomplete_defs = True
warn_return_any = True
check_untyped_defs = True

[mypy-benchmarking]
check_untyped_defs = True

[mypy-rescore]
check_untyped_defs = True

[mypy-decisions]
disallow_incomplete_defs = True
disallow_untyped_defs = True
warn_return_any = True
check_untyped_defs = True

[mypy-logging_setup]
disallow_incomplete_defs = True
check_untyped_defs = True

[mypy-redaction]
disallow_incomplete_defs = True
disallow_untyped_defs = True
warn_return_any = True
check_untyped_defs = True

[mypy-trace_evaluation]
check_untyped_defs = True
